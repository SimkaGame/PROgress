{% load static %}

<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}PROgress{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
    </head>
    
    <body class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid d-flex justify-content-between align-items-center">

                    <div class="d-flex align-items-center">
                        <a class="navbar-brand" href="{% url 'home' %}">
                            <img style="height: 64px;" src="{% static 'pages/main.jpg' %}" alt="Логотип"/>
                        </a>

                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                <li class="nav-item">
                                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" 
                                    href="{% url 'home' %}">Главная</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link {% if request.resolver_match.url_name == 'daily' %}active{% endif %}" 
                                    href="{% url 'daily' %}">Ежедневные задачи</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link {% if request.resolver_match.url_name == 'progress' %}active{% endif %}" 
                                    href="{% url 'progress' %}">Прогресс</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link {% if request.resolver_match.url_name == 'game' %}active{% endif %}" 
                                    href="{% url 'game' %}">Игра</a>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="d-flex align-items-center">
                        <button class="navbar-toggler me-2" type="button" 
                                data-bs-toggle="collapse" 
                                data-bs-target="#navbarSupportedContent"
                                aria-controls="navbarSupportedContent" 
                                aria-expanded="false" 
                                aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <a class="btn btn-primary btn-lg" href="#">Войти</a>
                    </div>

                </div>
            </nav>
        </header>

        <main class="flex-grow-1">
            {% block content %}
            {% endblock %}
        </main>

        <footer class="text-center py-3 bg-light mt-auto">
            © Минин Д.И (2026)
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
                crossorigin="anonymous"></script>
    </body>
</html>
